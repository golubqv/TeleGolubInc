<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TeleGolub</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="logo">

                <div class="logo-icon">

                    🕊️

                </div>

                <div>

                    <h1>TeleGolub</h1>

                    <p>Modern Messenger</p>

                </div>

            </div>

            <div class="search">

                <input
                type="text"
                placeholder="Поиск">

            </div>

        </div>

        <div class="chat-list">

            <!-- JS -->

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <header class="header">

            <div class="chat-user">

                <div class="avatar big">

                    A

                </div>

                <div>

                    <h2>Выберите чат</h2>

                    <span>

                        Добро пожаловать в TeleGolub

                    </span>

                </div>

            </div>

            <div class="header-buttons">

                <button>📞</button>

                <button>🎥</button>

                <button>⋮</button>

            </div>

        </header>

        <section
        class="messages">

        </section>

        <footer
        class="composer">

            <button class="icon-btn">
    <i data-lucide="smile"></i>
</button>

<button class="icon-btn">
    <i data-lucide="paperclip"></i>
</button>

<button class="icon-btn">
    <i data-lucide="mic"></i>
</button>

<button class="send">
    <i data-lucide="send"></i>
</button>

            <input
            placeholder="Введите сообщение...">

            <button>

                🎤

            </button>

        </footer>

    </main>

</div>

    <script src="https://unpkg.com/lucide@latest"></script>

<script>
lucide.createIcons();
</script>

<script
src="js/app.js"></script>

</body>
  </html>
