<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TeleGolub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/chat.css">
<link rel="stylesheet" href="css/composer.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/animations.css">

</head>

<body>

<div class="background">

<div class="bg-circle bg1"></div>

<div class="bg-circle bg2"></div>

<div class="bg-circle bg3"></div>

</div>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

<div class="sidebar-header">

<div class="logo">

<div class="logo-icon">

<i class="fa-solid fa-dove"></i>

</div>

<div>

<h1>TeleGolub</h1>

<p>Modern Messenger</p>

</div>

</div>

<button class="menu">

<i class="fa-solid fa-bars"></i>

</button>

</div>

<div class="search">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
placeholder="Поиск">

</div>

<div class="chat-list" id="chatList">

<!-- сюда будут подгружаться чаты -->

</div>

</aside>

<!-- ================= MAIN ================= -->

<main class="main">

<header class="header">

<div class="header-user">

<div class="avatar" id="chatAvatar">

A

</div>

<div>

<h2 id="chatName">

Выберите чат

</h2>

<p id="chatStatus">

Онлайн

</p>

</div>

</div>

<div class="header-actions">

<button>

<i class="fa-solid fa-phone"></i>

</button>

<button>

<i class="fa-solid fa-video"></i>

</button>

<button>

<i class="fa-solid fa-magnifying-glass"></i>

</button>

<button>

<i class="fa-solid fa-ellipsis-vertical"></i>

</button>

</div>

</header>

<section
class="messages"
id="messages">

<div class="empty-chat">

<i class="fa-solid fa-comments"></i>

<h2>

Добро пожаловать в TeleGolub

</h2>

<p>

Выберите чат слева или создайте новый.

</p>

</div>

</section>

<footer class="composer">

<button id="emojiBtn">

<i class="fa-regular fa-face-smile"></i>

</button>

<button id="attachBtn">

<i class="fa-solid fa-paperclip"></i>

</button>

<input
id="messageInput"
type="text"
placeholder="Напишите сообщение...">

<button id="voiceBtn">

<i class="fa-solid fa-microphone"></i>

</button>

<button
id="sendBtn"
class="send">

<i class="fa-solid fa-paper-plane"></i>

</button>

</footer>

</main>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/sidebar.js"></script>
<script type="module" src="js/chat.js"></script>
<script type="module" src="js/composer.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
